<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Google Sheets DB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #075E54; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; border-radius: 12px; padding: 40px; width: 350px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .login-container h1 { color: #075E54; text-align: center; margin-bottom: 10px; }
        .login-container .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .login-container input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-container input:focus { outline: none; border-color: #25D366; }
        .login-container button { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 16px; }
        .toggle-mode { text-align: center; margin-top: 16px; color: #075E54; cursor: pointer; font-size: 14px; }
        .error-msg { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 12px; }
        .chat-container { display: none; width: 100%; height: 100vh; background: #ECE5DD; }
        .sidebar { width: 30%; background: white; height: 100%; float: left; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .sidebar-header { background: #075E54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .logout-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px 10px; }
        .users-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; }
        .user-item:hover { background: #f5f5f5; }
        .user-item.active { background: #E8F5E9; }
        .user-name { font-weight: 500; color: #333; }
        .chat-area { width: 70%; height: 100%; float: left; display: flex; flex-direction: column; background: #ECE5DD; }
        .chat-header { background: #075E54; color: white; padding: 15px; display: none; align-items: center; gap: 15px; }
        .chat-header-avatar { width: 40px; height: 40px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 60%; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; }
        .message.sent { background: #DCF8C6; align-self: flex-end; }
        .message.received { background: white; align-self: flex-start; }
        .message-text { font-size: 14px; word-wrap: break-word; }
        .message-time { font-size: 10px; color: #666; margin-top: 4px; }
        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; display: none; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .input-area button { padding: 10px 20px; background: #25D366; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .empty-state { text-align: center; color: #999; padding: 40px; }
        .loading { text-align: center; padding: 20px; color: #999; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <h1>💬 Simple Chat</h1>
        <div class="subtitle" id="formSubtitle">Sign in to continue</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="fullName" placeholder="Full Name" style="display:none">
        <button id="actionBtn" onclick="handleAuth()">Login</button>
        <div class="toggle-mode" onclick="toggleMode()">Create new account</div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <div id="chatContainer" class="chat-container clearfix">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">?</div>
                    <div><strong id="userName">User</strong><br><span style="font-size:12px">● Online</span></div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            <div class="users-list" id="usersList">
                <div class="loading">Loading users...</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-avatar" id="chatAvatar">?</div>
                <div><strong id="chatName">Select a user</strong><br><span style="font-size:12px">Click to chat</span></div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">👈 Select a user to start chatting</div>
            </div>
            <div class="input-area" id="inputArea">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR APPS SCRIPT DEPLOYMENT URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbxQDE8-rs_ziWwhBBY_PxjJO3lAh9kTUhz9z2clOJOY-vrncI3nrsQjX0kHoMn6Z3NUkw/exec';
        
        let currentUser = null;
        let currentChat = null;
        let refreshTimer = null;
        let isRegisterMode = false;
        
        async function callAPI(action, data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...data })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: error.message };
            }
        }
        
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            const subtitle = document.getElementById('formSubtitle');
            const actionBtn = document.getElementById('actionBtn');
            const fullNameField = document.getElementById('fullName');
            const toggleText = document.querySelector('.toggle-mode');
            
            if (isRegisterMode) {
                subtitle.textContent = 'Create new account';
                actionBtn.textContent = 'Register';
                fullNameField.style.display = 'block';
                toggleText.innerHTML = '← Back to login';
            } else {
                subtitle.textContent = 'Sign in to continue';
                actionBtn.textContent = 'Login';
                fullNameField.style.display = 'none';
                toggleText.innerHTML = 'Create new account';
            }
            document.getElementById('errorMsg').textContent = '';
        }
        
        async function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorDiv.textContent = 'Please fill all fields';
                return;
            }
            
            if (isRegisterMode) {
                const fullName = document.getElementById('fullName').value.trim();
                if (!fullName) {
                    errorDiv.textContent = 'Please enter your full name';
                    return;
                }
                
                errorDiv.style.color = '#25D366';
                errorDiv.textContent = 'Creating account...';
                
                const result = await callAPI('register', { username, password, fullName });
                if (result.success) {
                    errorDiv.textContent = result.message;
                    setTimeout(() => {
                        toggleMode();
                        document.getElementById('username').value = '';
                        document.getElementById('password').value = '';
                        document.getElementById('fullName').value = '';
                        errorDiv.textContent = '';
                    }, 2000);
                } else {
                    errorDiv.style.color = '#e74c3c';
                    errorDiv.textContent = result.error;
                }
            } else {
                errorDiv.style.color = '#25D366';
                errorDiv.textContent = 'Logging in...';
                
                const result = await callAPI('login', { username, password });
                if (result.success) {
                    currentUser = result;
                    startChat();
                } else {
                    errorDiv.style.color = '#e74c3c';
                    errorDiv.textContent = result.error;
                }
            }
        }
        
        function startChat() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'block';
            
            const initial = currentUser.fullName.charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = initial;
            document.getElementById('userName').textContent = currentUser.fullName;
            
            loadUsers();
            
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => {
                if (currentChat) loadMessages();
                loadUsers();
            }, 3000);
        }
        
        async function loadUsers() {
            const result = await callAPI('getUsers', { currentUser: currentUser.username });
            if (result.error) return;
            
            const container = document.getElementById('usersList');
            if (!result.users || result.users.length === 0) {
                container.innerHTML = '<div class="empty-state">👥 No other users found<br><br>Create another account to chat!</div>';
                return;
            }
            
            container.innerHTML = '';
            result.users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item';
                if (currentChat === user.username) div.classList.add('active');
                div.innerHTML = `
                    <div class="user-name">${escapeHtml(user.fullName)}</div>
                    <div style="font-size:12px; color:#888;">@${escapeHtml(user.username)}</div>
                `;
                div.onclick = () => selectUser(user.username, user.fullName);
                container.appendChild(div);
            });
        }
        
        function selectUser(username, fullName) {
            currentChat = username;
            loadUsers();
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = fullName.charAt(0).toUpperCase();
            document.getElementById('chatName').textContent = fullName;
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentChat) return;
            
            const result = await callAPI('getMessages', { 
                currentUser: currentUser.username, 
                withUser: currentChat 
            });
            
            if (result.error) return;
            
            const container = document.getElementById('messagesArea');
            if (!result.messages || result.messages.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ No messages yet<br>Send a message to start!</div>';
                return;
            }
            
            container.innerHTML = '';
            result.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.isMe ? 'sent' : 'received'}`;
                let timeStr = '';
                if (msg.time) {
                    try {
                        const d = new Date(msg.time);
                        timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    } catch(e) {}
                }
                div.innerHTML = `
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    ${timeStr ? `<div class="message-time">${timeStr}</div>` : ''}
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentChat) return;
            
            const result = await callAPI('sendMessage', {
                fromUser: currentUser.username,
                toUser: currentChat,
                message: message
            });
            
            if (result.success) {
                input.value = '';
                loadMessages();
            }
        }
        
        function logout() {
            if (refreshTimer) clearInterval(refreshTimer);
            currentUser = null;
            currentChat = null;
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMsg').textContent = '';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('keypress', function(e) {
            const input = document.getElementById('messageInput');
            if (e.key === 'Enter' && input && document.activeElement === input) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
