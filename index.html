<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 40px;
            width: 400px;
        }

        .login-card h1 {
            color: #25D366;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: white;
            outline: none;
        }

        .login-card input:focus {
            border-color: #25D366;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            margin: 16px 0 8px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-mode {
            text-align: center;
            color: #25D366;
            cursor: pointer;
            font-size: 14px;
            margin-top: 16px;
        }

        .error-msg {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
        }

        /* Chat App */
        .chat-app {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .sidebar {
            width: 30%;
            background: #111111;
            border-right: 1px solid #222;
            height: 100vh;
            float: left;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
        }

        .profile {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .profile-info {
            flex: 1;
            margin-left: 12px;
        }

        .profile-name {
            color: white;
            font-weight: 600;
        }

        .profile-status {
            color: #25D366;
            font-size: 12px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #1a1a1a;
        }

        .chat-item:hover {
            background: #1a1a1a;
        }

        .chat-item.active {
            background: #1e2a1e;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .chat-details {
            flex: 1;
            margin-left: 12px;
        }

        .chat-name {
            color: white;
            font-weight: 500;
        }

        .chat-preview {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }

        .chat-area {
            width: 70%;
            height: 100vh;
            float: left;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }

        .chat-header {
            padding: 16px 20px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        .chat-header-info {
            flex: 1;
            margin-left: 12px;
        }

        .chat-header-name {
            color: white;
            font-weight: 600;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }

        .message.me {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 18px;
        }

        .message:not(.me) .bubble {
            background: #1e1e1e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.me .bubble {
            background: #25D366;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-text {
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .input-area {
            padding: 16px 20px;
            background: #0d0d0d;
            border-top: 1px solid #222;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            font-size: 15px;
            color: white;
            outline: none;
        }

        .input-area input:focus {
            border-color: #25D366;
        }

        .input-area button {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>Chat App</h1>
            <div class="subtitle" id="formSubtitle">Sign in to continue</div>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password" autocomplete="off">
            <input type="text" id="fullName" placeholder="Full Name" style="display:none" autocomplete="off">
            <button id="actionBtn" onclick="handleAuth()">Login</button>
            <div class="toggle-mode" onclick="toggleMode()">Create new account</div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <!-- Chat App -->
    <div id="chatApp" class="chat-app clearfix">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="profile">
                    <div class="avatar" id="userAvatar">?</div>
                    <div class="profile-info">
                        <div class="profile-name" id="userName">Loading...</div>
                        <div class="profile-status">● Online</div>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪</button>
                </div>
            </div>
            <div class="chat-list" id="chatList">
                <div class="empty-state">Loading chats...</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display:none">
                <div class="chat-header-avatar" id="chatAvatar">?</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">Select a chat</div>
                    <div style="color:#25D366; font-size:12px">Online</div>
                </div>
            </div>
            <div class="messages" id="messages">
                <div class="empty-state">👈 Select a chat to start messaging</div>
            </div>
            <div class="input-area" id="inputArea" style="display:none">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        // REPLACE THIS WITH YOUR APPS SCRIPT WEB APP URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbyoDfTUQ4PcKZK61ALJE9Ik2a7gYz7efPzrq1K1FwfgMzUE29qFm6sLFv27zl6ULFOw/exec';
        
        let currentUser = null;
        let currentChat = null;
        let refreshTimer = null;
        let isRegisterMode = false;

        async function callAPI(action, data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action, ...data })
                });
                
                // Since mode is 'no-cors', we need a different approach
                // Let's use JSONP style or fetch with proper CORS
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: error.message };
            }
        }

        // Better approach - use Google Script's built-in CORS support
        function callGAS(action, data, callback) {
            google.script.run
                .withSuccessHandler(callback)
                .withFailureHandler((error) => {
                    console.error('Error:', error);
                    callback({ error: error.message });
                })
                [action](data);
        }

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            const subtitle = document.getElementById('formSubtitle');
            const actionBtn = document.getElementById('actionBtn');
            const fullNameField = document.getElementById('fullName');
            const toggleText = document.querySelector('.toggle-mode');
            
            if (isRegisterMode) {
                subtitle.textContent = 'Create your account';
                actionBtn.textContent = 'Register';
                fullNameField.style.display = 'block';
                toggleText.innerHTML = '← Back to login';
            } else {
                subtitle.textContent = 'Sign in to continue';
                actionBtn.textContent = 'Login';
                fullNameField.style.display = 'none';
                toggleText.innerHTML = 'Create new account';
            }
            document.getElementById('errorMsg').textContent = '';
        }

        function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                return;
            }
            
            if (isRegisterMode) {
                const fullName = document.getElementById('fullName').value.trim();
                if (!fullName) {
                    errorDiv.textContent = 'Please enter your full name';
                    return;
                }
                
                google.script.run
                    .withSuccessHandler(function(result) {
                        if (result.success) {
                            errorDiv.style.color = '#25D366';
                            errorDiv.textContent = result.message;
                            setTimeout(() => {
                                toggleMode();
                                document.getElementById('username').value = '';
                                document.getElementById('password').value = '';
                                document.getElementById('fullName').value = '';
                                errorDiv.textContent = '';
                            }, 2000);
                        } else {
                            errorDiv.textContent = result.error;
                        }
                    })
                    .registerUser(username, password, fullName);
            } else {
                errorDiv.textContent = 'Logging in...';
                errorDiv.style.color = '#25D366';
                
                google.script.run
                    .withSuccessHandler(function(result) {
                        if (result.success) {
                            currentUser = result;
                            startChat();
                        } else {
                            errorDiv.style.color = '#ff4444';
                            errorDiv.textContent = result.error;
                        }
                    })
                    .loginUser(username, password);
            }
        }

        function startChat() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatApp').style.display = 'block';
            
            const initial = currentUser.fullName.charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = initial;
            document.getElementById('userName').textContent = currentUser.fullName;
            
            loadUsers();
            
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => {
                if (currentChat) {
                    loadMessages();
                }
            }, 2000);
        }

        function loadUsers() {
            google.script.run
                .withSuccessHandler(function(result) {
                    const container = document.getElementById('chatList');
                    
                    if (result.users.length === 0) {
                        container.innerHTML = '<div class="empty-state">👥 No other users found<br><br>💡 Register another account to chat!</div>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    result.users.forEach(user => {
                        const initial = user.fullName.charAt(0).toUpperCase();
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        if (currentChat === user.username) div.classList.add('active');
                        div.innerHTML = `
                            <div class="chat-avatar">${escapeHtml(initial)}</div>
                            <div class="chat-details">
                                <div class="chat-name">${escapeHtml(user.fullName)}</div>
                                <div class="chat-preview" id="preview_${user.username}">Tap to chat</div>
                            </div>
                        `;
                        div.onclick = () => selectUser(user.username, user.fullName);
                        container.appendChild(div);
                    });
                })
                .getUsers(currentUser.username);
        }

        function selectUser(username, fullName) {
            currentChat = username;
            
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const items = document.querySelectorAll('.chat-item');
            for (let item of items) {
                const nameSpan = item.querySelector('.chat-name');
                if (nameSpan && nameSpan.textContent === fullName) {
                    item.classList.add('active');
                    break;
                }
            }
            
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = fullName.charAt(0).toUpperCase();
            document.getElementById('chatName').textContent = fullName;
            
            loadMessages();
        }

        function loadMessages() {
            if (!currentChat) return;
            
            google.script.run
                .withSuccessHandler(function(result) {
                    const container = document.getElementById('messages');
                    
                    if (result.messages.length === 0) {
                        container.innerHTML = '<div class="empty-state">✨ No messages yet<br>Send a message to start the conversation!</div>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    result.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.isMe ? 'me' : ''}`;
                        
                        let timeStr = '';
                        if (msg.time) {
                            try {
                                const d = new Date(msg.time);
                                timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            } catch(e) {}
                        }
                        
                        div.innerHTML = `
                            <div class="bubble">
                                <div class="message-text">${escapeHtml(msg.text)}</div>
                                ${timeStr ? `<div class="message-time">${timeStr}</div>` : ''}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                    
                    // Update preview
                    if (result.messages.length > 0) {
                        const lastMsg = result.messages[result.messages.length - 1];
                        const preview = document.getElementById(`preview_${currentChat}`);
                        if (preview) {
                            const prefix = lastMsg.isMe ? 'You: ' : '';
                            const shortMsg = lastMsg.text.length > 30 ? lastMsg.text.substring(0, 30) + '...' : lastMsg.text;
                            preview.textContent = prefix + shortMsg;
                        }
                    }
                })
                .getMessages(currentUser.username, currentChat);
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) {
                input.focus();
                return;
            }
            if (!currentChat) {
                alert('Select a user first');
                return;
            }
            
            const sendBtn = document.querySelector('.input-area button');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            
            google.script.run
                .withSuccessHandler(function(result) {
                    if (result.success) {
                        input.value = '';
                        input.focus();
                        loadMessages();
                    } else {
                        alert('Failed to send');
                    }
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send';
                })
                .sendMessage(currentUser.username, currentChat, message);
        }

        function logout() {
            if (refreshTimer) clearInterval(refreshTimer);
            currentUser = null;
            currentChat = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('chatApp').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMsg').textContent = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('keypress', function(e) {
            const input = document.getElementById('messageInput');
            if (e.key === 'Enter' && input && document.activeElement === input) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
